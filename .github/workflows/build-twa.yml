name: Build TWA APK and AAB

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias android \
            -dname "CN=My Client Id, OU=Dev, O=PassNet, L=Jakarta, ST=DKI, C=ID" \
            -storepass android -keypass android
          echo "Generated Keystore successfully."

      - name: Install ImageMagick for icon processing
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Process Icon
        run: |
          if [ -f "icon.png" ]; then
            find app/src/main/res -name "ic_launcher*.xml" -delete
            find app/src/main/res -name "ic_launcher*.webp" -delete
            rm -rf app/src/main/res/mipmap-anydpi-v26

            convert icon.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

            cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            echo "Icon customized using root icon.png"
          else
            echo "No root icon.png found. Using default."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          APP_KEYSTORE_PASSWORD: android
          APP_KEY_ALIAS: android
          APP_KEY_PASSWORD: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        env:
          APP_KEYSTORE_PASSWORD: android
          APP_KEY_ALIAS: android
          APP_KEY_PASSWORD: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
